<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pruning Papers Explorer</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0f1117;--card:#1a1d27;--border:#2a2d3a;--text:#e1e4ed;--muted:#8b8fa3;--accent:#6c8cff;--accent2:#a78bfa;--green:#34d399;--orange:#fb923c;--pink:#f472b6;--tag-bg:#232636;--hover:#252839}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--text);line-height:1.5;min-height:100vh}
.container{max-width:1400px;margin:0 auto;padding:16px 24px}
header{padding:24px 0 16px;display:flex;align-items:baseline;gap:16px;flex-wrap:wrap}
header h1{font-size:1.5rem;font-weight:700;letter-spacing:-0.02em}
header .count{font-size:.85rem;color:var(--muted);font-weight:400}
.controls{display:flex;flex-direction:column;gap:12px;margin-bottom:16px;position:sticky;top:0;z-index:10;background:var(--bg);padding:8px 0 12px;border-bottom:1px solid var(--border)}
.search-row{display:flex;gap:10px;align-items:center}
.search-box{flex:1;padding:10px 14px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:.9rem;outline:none;transition:border .2s}
.search-box:focus{border-color:var(--accent)}
.filter-section{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.filter-section .label{font-size:.75rem;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;font-weight:600;min-width:70px}
.chip{display:inline-flex;align-items:center;padding:4px 10px;border-radius:6px;font-size:.75rem;font-weight:500;cursor:pointer;border:1px solid var(--border);background:var(--tag-bg);color:var(--muted);transition:all .15s;user-select:none;white-space:nowrap}
.chip:hover{border-color:var(--accent);color:var(--text)}
.chip.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.chip.conf-active{background:#374151;color:var(--green);border-color:var(--green)}
.chip.topic-active{background:#312e3f;color:var(--accent2);border-color:var(--accent2)}
.tag-groups{display:flex;gap:16px;flex-wrap:wrap}
.tag-group{display:flex;gap:4px;flex-wrap:wrap;align-items:center}
.tag-group .group-label{font-size:.65rem;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;font-weight:700;margin-right:2px}
.paper-list{display:flex;flex-direction:column;gap:6px;margin-top:8px}
.paper-card{display:flex;gap:12px;padding:10px 14px;background:var(--card);border:1px solid var(--border);border-radius:8px;transition:border .15s;align-items:flex-start}
.paper-card:hover{border-color:#3a3d4a}
.paper-main{flex:1;min-width:0}
.paper-title{font-size:.88rem;font-weight:500;margin-bottom:4px;line-height:1.4}
.paper-meta{display:flex;gap:8px;align-items:center;margin-bottom:5px;flex-wrap:wrap}
.conf-badge{display:inline-block;padding:2px 7px;border-radius:4px;font-size:.68rem;font-weight:600}
.conf-ICLR{background:#1e3a5f;color:#60a5fa}
.conf-NeurIPS{background:#3b1f4e;color:#c084fc}
.conf-CVPR{background:#1e3b2e;color:#34d399}
.conf-AAAI{background:#3b2f1e;color:#fb923c}
.conf-ICML{background:#3b1e2e;color:#f472b6}
.conf-ACML{background:#1e3b3b;color:#67e8f9}
.year-badge{font-size:.72rem;color:var(--muted);font-variant-numeric:tabular-nums}
.topic-badge{font-size:.68rem;color:var(--muted);background:var(--tag-bg);padding:2px 6px;border-radius:3px}
.paper-tags{display:flex;gap:3px;flex-wrap:wrap;margin-top:3px}
.tag-pill{display:inline-block;padding:1px 6px;border-radius:3px;font-size:.63rem;background:var(--tag-bg);color:var(--muted);border:1px solid transparent;cursor:pointer;transition:all .12s}
.tag-pill:hover{border-color:var(--accent);color:var(--text)}
.tag-pill.matched{background:#1e2a4a;color:var(--accent);border-color:var(--accent)}
.paper-links{display:flex;flex-direction:column;gap:4px;flex-shrink:0;padding-top:2px}
.link-btn{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:5px;font-size:.7rem;font-weight:500;text-decoration:none;border:1px solid var(--border);transition:all .15s;white-space:nowrap}
.link-btn:hover{border-color:var(--accent)}
.link-local{color:var(--green);background:#0d1f17}
.link-local:hover{background:#132b1f;border-color:var(--green)}
.link-online{color:var(--accent);background:#111827}
.link-online:hover{background:#1a2744;border-color:var(--accent)}
.link-btn svg{width:12px;height:12px;flex-shrink:0}
.no-results{text-align:center;padding:60px 20px;color:var(--muted)}
.no-results h3{font-size:1.1rem;margin-bottom:8px;color:var(--text)}
.stats-bar{display:flex;gap:24px;font-size:.75rem;color:var(--muted);padding:8px 0}
.clear-btn{padding:4px 10px;border-radius:6px;font-size:.72rem;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--muted);transition:all .15s}
.clear-btn:hover{border-color:#ef4444;color:#ef4444}
@media(max-width:768px){
  .container{padding:8px 12px}
  .tag-groups{flex-direction:column;gap:6px}
  .paper-card{flex-direction:column}
  .paper-links{flex-direction:row}
}
</style>
</head>

let activeConfs=new Set();
let activeTopics=new Set();
let activeTags=new Set();
let searchQuery="";
let sortCol="year";
let sortDir=-1;

function init(){
  const confDiv=document.getElementById("confFilters");
  CONFS.forEach(c=>{
    const chip=document.createElement("span");
    chip.className="chip";chip.dataset.conf=c;chip.textContent=c;
    chip.onclick=()=>toggleConf(c,chip);confDiv.appendChild(chip);
  });
  const topicDiv=document.getElementById("topicFilters");
  TOPICS.forEach(tp=>{
    const chip=document.createElement("span");
    chip.className="chip";chip.dataset.topic=tp;chip.textContent=tp;
    chip.onclick=()=>toggleTopic(tp,chip);topicDiv.appendChild(chip);
  });
  const tagDiv=document.getElementById("tagFilters");
  for(const[group,tags]of Object.entries(TAG_GROUPS)){
    const gDiv=document.createElement("div");gDiv.className="tag-group";
    const lbl=document.createElement("span");lbl.className="group-label";lbl.textContent=group;gDiv.appendChild(lbl);
    tags.forEach(tg=>{
      const chip=document.createElement("span");chip.className="chip";chip.dataset.tag=tg;chip.textContent=tg;
      chip.onclick=()=>toggleTag(tg,chip);gDiv.appendChild(chip);
    });
    tagDiv.appendChild(gDiv);
  }
  document.getElementById("searchBox").addEventListener("input",e=>{searchQuery=e.target.value.toLowerCase().trim();render();});
  document.getElementById("clearBtn").onclick=clearAll;
  render();
}

function toggleConf(c,chip){if(activeConfs.has(c)){activeConfs.delete(c);chip.classList.remove("conf-active");}else{activeConfs.add(c);chip.classList.add("conf-active");}render();}
function toggleTopic(tp,chip){if(activeTopics.has(tp)){activeTopics.delete(tp);chip.classList.remove("topic-active");}else{activeTopics.add(tp);chip.classList.add("topic-active");}render();}
function toggleTag(tg,chip){if(activeTags.has(tg)){activeTags.delete(tg);chip.classList.remove("active");}else{activeTags.add(tg);chip.classList.add("active");}render();}
function clearAll(){activeConfs.clear();activeTopics.clear();activeTags.clear();searchQuery="";document.getElementById("searchBox").value="";document.querySelectorAll(".chip").forEach(c=>c.classList.remove("active","conf-active","topic-active"));render();}

function render(){
  let filtered=PAPERS.filter(p=>{
    if(activeConfs.size&&!activeConfs.has(p.conf))return false;
    if(activeTopics.size&&!activeTopics.has(p.topic))return false;
    if(activeTags.size){for(const tg of activeTags)if(!p.tags.includes(tg))return false;}
    if(searchQuery&&!p.title.toLowerCase().includes(searchQuery))return false;
    return true;
  });
  filtered.sort((a,b)=>{
    let va,vb;
    if(sortCol==="title"){va=a.title.toLowerCase();vb=b.title.toLowerCase();}
    else if(sortCol==="conf"){va=a.conf;vb=b.conf;}
    else if(sortCol==="year"){va=a.year;vb=b.year;}
    else if(sortCol==="topic"){va=a.topic;vb=b.topic;}
    if(va<vb)return -sortDir;if(va>vb)return sortDir;return 0;
  });
  document.getElementById("totalCount").textContent=filtered.length+" / "+PAPERS.length+" papers";

  const list=document.getElementById("paperList");
  const nr=document.getElementById("noResults");
  if(!filtered.length){list.innerHTML="";nr.style.display="block";return;}
  nr.style.display="none";

  const frag=document.createDocumentFragment();
  filtered.forEach(p=>{
    const card=document.createElement("div");card.className="paper-card";

    const main=document.createElement("div");main.className="paper-main";

    const titleEl=document.createElement("div");titleEl.className="paper-title";titleEl.textContent=p.title;
    main.appendChild(titleEl);

    const meta=document.createElement("div");meta.className="paper-meta";
    const badge=document.createElement("span");badge.className="conf-badge conf-"+p.conf;badge.textContent=p.conf;
    const yearEl=document.createElement("span");yearEl.className="year-badge";yearEl.textContent=p.year;
    const topicEl=document.createElement("span");topicEl.className="topic-badge";topicEl.textContent=p.topic;
    meta.appendChild(badge);meta.appendChild(yearEl);meta.appendChild(topicEl);
    main.appendChild(meta);

    if(p.tags.length){
      const tagsDiv=document.createElement("div");tagsDiv.className="paper-tags";
      p.tags.forEach(tg=>{
        const pill=document.createElement("span");
        pill.className="tag-pill"+(activeTags.has(tg)?" matched":"");
        pill.textContent=tg;
        pill.onclick=()=>{const c=document.querySelector('.chip[data-tag="'+tg+'"]');if(c)toggleTag(tg,c);};
        tagsDiv.appendChild(pill);
      });
      main.appendChild(tagsDiv);
    }

    const links=document.createElement("div");links.className="paper-links";
    if(p.path){
      const a=document.createElement("a");a.className="link-btn link-local";a.href=p.path;a.target="_blank";
      a.innerHTML=SVG_LOCAL+' Local';links.appendChild(a);
    }
    if(p.url){
      const a=document.createElement("a");a.className="link-btn link-online";a.href=p.url;a.target="_blank";
      a.innerHTML=SVG_ONLINE+' Online';links.appendChild(a);
    }

    card.appendChild(main);card.appendChild(links);
    frag.appendChild(card);
  });
  list.innerHTML="";
  list.appendChild(frag);

  const confCounts={};
  filtered.forEach(p=>confCounts[p.conf]=(confCounts[p.conf]||0)+1);
  document.getElementById("statsBar").innerHTML=Object.entries(confCounts).sort((a,b)=>b[1]-a[1]).map(([c,n])=>"<span>"+c+": "+n+"</span>").join("");
}

init();
</script>
</body>
</html>
